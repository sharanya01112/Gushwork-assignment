<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gushwork Assignment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar" id="navbar">
    <div class="logo">Gushwork</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Gallery</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Build something amazing 🚀</h1>
      <p>A clean UI based on Figma design</p>
      <button>Get Started</button>
    </div>
  </section>

  <!-- Cards Section -->
  <section class="cards">
    <h2>What we offer</h2>

    <div class="card-container">
      <div class="card">
        <h3>Fast</h3>
        <p>Optimized performance and smooth UI.</p>
      </div>

      <div class="card">
        <h3>Responsive</h3>
        <p>Works perfectly on all devices.</p>
      </div>

      <div class="card">
        <h3>Simple</h3>
        <p>Clean and minimal design approach.</p>
      </div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="gallery">
    <h2>Gallery</h2>

    <div class="carousel">
      <div class="carousel-track">

        <!-- IMPORTANT: place your downloaded images in /images folder -->
        <img src="images/img1.jpg" alt="image1">
        <img src="images/img2.jpg" alt="image2">
        <img src="images/img3.jpg" alt="image3">

      </div>
    </div>

    <!-- Zoom Preview -->
    <div class="zoom-preview" id="zoomPreview">
      <img src="" alt="zoom">
    </div>
  </section>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
